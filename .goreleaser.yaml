version: 2

project_name: dbibackend

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/dbibackend
    binary: dbibackend
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X github.com/kyungw00k/dbibackend/cmd.Version={{.Version}}
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

brews:
  - repository:
      owner: kyungw00k
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kyungw00k/dbibackend"
    description: "Install local titles into Nintendo Switch via USB"
    license: "MIT"
    install: |
      bin.install "dbibackend"
    test: |
      assert_match "dbibackend version", shell_output("#{bin}/dbibackend --version")

release:
  github:
    owner: kyungw00k
    name: dbibackend
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
